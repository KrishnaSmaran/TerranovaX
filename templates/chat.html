<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages | TerranovaX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:
    radial-gradient(circle at 20% 30%, rgba(31,111,67,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(122,31,43,0.15), transparent 40%),
    #050807;
  color:#d2d8d2;
  height:100vh;
  overflow:hidden;
}

/* ── LAYOUT ── */
.chat-layout{
  display:grid;
  grid-template-columns:320px 1fr;
  height:100vh;
}

/* ══════════════════════════════
   LEFT SIDEBAR
══════════════════════════════ */
.sidebar{
  background:rgba(10,10,10,0.8);
  border-right:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* SIDEBAR HEADER */
.sidebar-header{
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.sidebar-header .logo{
  color:#1f6f43;
  font-size:16px;
  font-weight:700;
}
.sidebar-header .back-btn{
  color:#9aa29a;
  font-size:13px;
  cursor:pointer;
  text-decoration:none;
  transition:0.2s;
}
.sidebar-header .back-btn:hover{color:#1f6f43;}

/* MY PROFILE */
.my-profile{
  padding:16px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.my-avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,#1f6f43,#7a1f2b);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:white;
  flex-shrink:0;overflow:hidden;position:relative;
}
.my-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.my-avatar .online-dot{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  background:#1f6f43;border:2px solid #0a0a0a;
}
.my-info .name{color:white;font-size:14px;font-weight:600;}
.my-info .status{color:#1f6f43;font-size:11px;margin-top:2px;}

/* SEARCH */
.search-box{
  padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.search-input{
  width:100%;padding:10px 14px;
  background:rgba(30,30,30,0.6);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;color:white;
  font-size:13px;outline:none;transition:0.3s;
  font-family:'Inter',sans-serif;
}
.search-input:focus{border-color:#1f6f43;}
.search-input::placeholder{color:#444;}

/* TABS */
.tabs{
  display:flex;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.tab{
  flex:1;padding:12px;text-align:center;
  font-size:12px;color:#555;cursor:pointer;
  transition:0.2s;border-bottom:2px solid transparent;
}
.tab.active{color:#1f6f43;border-bottom-color:#1f6f43;}
.tab:hover{color:#9aa29a;}

/* CONVERSATIONS LIST */
.conversations{
  flex:1;overflow-y:auto;
}
.conversations::-webkit-scrollbar{width:4px;}
.conversations::-webkit-scrollbar-thumb{background:#1f6f43;border-radius:4px;}

.conv-item{
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:0.2s;
  border-bottom:1px solid rgba(255,255,255,0.03);
  position:relative;
}
.conv-item:hover{background:rgba(31,111,67,0.08);}
.conv-item.active{background:rgba(31,111,67,0.12);}

.conv-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#1f6f43,#7a1f2b);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:white;
  flex-shrink:0;overflow:hidden;position:relative;
}
.conv-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.conv-avatar .online-dot{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;border-radius:50%;
  background:#1f6f43;border:2px solid #0a0a0a;
}

.conv-info{flex:1;min-width:0;}
.conv-name{color:white;font-size:14px;font-weight:600;margin-bottom:3px;}
.conv-last{color:#555;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-last.alert-msg{color:#ff9800;}

.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.conv-time{color:#444;font-size:11px;}
.conv-badge{
  background:#1f6f43;color:white;
  font-size:10px;font-weight:700;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}

/* ADD CONTACT BUTTON */
.add-contact-btn{
  margin:12px 16px;padding:12px;
  background:rgba(31,111,67,0.1);
  border:1px solid rgba(31,111,67,0.3);
  border-radius:10px;color:#1f6f43;
  font-size:13px;cursor:pointer;
  text-align:center;transition:0.3s;
  font-family:'Inter',sans-serif;
}
.add-contact-btn:hover{background:rgba(31,111,67,0.2);}

/* EMPTY STATE */
.empty-state{
  padding:40px 20px;text-align:center;color:#333;
  font-size:13px;line-height:1.8;
}
.empty-state .icon{font-size:40px;margin-bottom:12px;}

/* ══════════════════════════════
   MAIN CHAT AREA
══════════════════════════════ */
.chat-main{
  display:flex;flex-direction:column;
  background:rgba(5,8,7,0.5);
}

/* CHAT HEADER */
.chat-header{
  padding:16px 24px;
  background:rgba(10,10,10,0.8);
  border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;gap:14px;
}
.chat-header-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#1f6f43,#7a1f2b);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:white;
  flex-shrink:0;overflow:hidden;
}
.chat-header-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.chat-header-info{flex:1;}
.chat-header-name{color:white;font-size:15px;font-weight:600;}
.chat-header-status{color:#1f6f43;font-size:12px;margin-top:2px;}
.chat-header-actions{display:flex;gap:12px;}
.header-action-btn{
  background:transparent;border:none;
  color:#9aa29a;font-size:18px;cursor:pointer;
  padding:6px;border-radius:6px;transition:0.2s;
}
.header-action-btn:hover{color:#1f6f43;background:rgba(31,111,67,0.1);}

/* WELCOME SCREEN */
.welcome-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#333;text-align:center;padding:40px;
}
.welcome-screen .w-icon{font-size:60px;margin-bottom:20px;opacity:0.3;}
.welcome-screen h2{color:#444;font-size:20px;margin-bottom:10px;}
.welcome-screen p{font-size:14px;line-height:1.8;max-width:300px;}

/* MESSAGES AREA */
.messages-area{
  flex:1;overflow-y:auto;
  padding:20px 24px;
  display:flex;flex-direction:column;gap:12px;
}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:rgba(31,111,67,0.3);border-radius:4px;}

/* DATE DIVIDER */
.date-divider{
  text-align:center;
  font-size:11px;color:#333;
  margin:8px 0;
  position:relative;
}
.date-divider::before,.date-divider::after{
  content:'';position:absolute;top:50%;
  width:40%;height:1px;background:rgba(255,255,255,0.05);
}
.date-divider::before{left:0;}
.date-divider::after{right:0;}

/* MESSAGE BUBBLE */
.msg{
  display:flex;gap:8px;max-width:70%;
  animation:msgIn 0.2s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg.sent{align-self:flex-end;flex-direction:row-reverse;}
.msg.received{align-self:flex-start;}

.msg-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#1f6f43,#7a1f2b);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:white;
  flex-shrink:0;align-self:flex-end;overflow:hidden;
}
.msg-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

.msg-bubble{
  padding:10px 14px;border-radius:14px;
  font-size:14px;line-height:1.5;
  max-width:100%;word-break:break-word;
}
.msg.sent .msg-bubble{
  background:rgba(31,111,67,0.25);
  border:1px solid rgba(31,111,67,0.3);
  border-radius:14px 14px 4px 14px;
  color:#d2d8d2;
}
.msg.received .msg-bubble{
  background:rgba(30,30,30,0.6);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px 14px 14px 4px;
  color:#d2d8d2;
}

/* ALERT MESSAGE */
.msg-bubble.alert-bubble{
  background:rgba(122,31,43,0.2);
  border-color:rgba(122,31,43,0.4);
  border-left:3px solid #7a1f2b;
}
.alert-bubble .alert-tag{
  font-size:10px;color:#ff6b6b;
  letter-spacing:1px;font-weight:700;
  margin-bottom:4px;display:block;
}
.alert-bubble .alert-title{
  color:white;font-weight:600;
  margin-bottom:4px;
}
.alert-bubble .alert-loc{
  font-size:11px;color:#9aa29a;
}

.msg-time{
  font-size:10px;color:#444;
  margin-top:4px;
  display:flex;align-items:center;gap:4px;
}
.msg.sent .msg-time{justify-content:flex-end;}
.read-tick{color:#1f6f43;font-size:12px;}

/* TYPING INDICATOR */
.typing-indicator{
  align-self:flex-start;
  display:none;
  gap:8px;
  align-items:flex-end;
}
.typing-indicator.show{display:flex;}
.typing-bubble{
  background:rgba(30,30,30,0.6);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px 14px 14px 4px;
  padding:10px 14px;
  display:flex;gap:4px;align-items:center;
}
.typing-dot{
  width:6px;height:6px;border-radius:50%;
  background:#1f6f43;
  animation:typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* INPUT AREA */
.input-area{
  padding:16px 24px;
  background:rgba(10,10,10,0.8);
  border-top:1px solid rgba(255,255,255,0.05);
}
.input-row{
  display:flex;align-items:flex-end;gap:10px;
}
.msg-input{
  flex:1;padding:12px 16px;
  background:rgba(30,30,30,0.6);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;color:white;
  font-size:14px;outline:none;
  resize:none;max-height:120px;
  transition:0.3s;font-family:'Inter',sans-serif;
  line-height:1.5;
}
.msg-input:focus{border-color:#1f6f43;}
.msg-input::placeholder{color:#444;}

.send-btn{
  width:42px;height:42px;border-radius:50%;
  background:#1f6f43;border:none;
  color:white;font-size:18px;
  cursor:pointer;transition:0.3s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.send-btn:hover{background:#4caf50;transform:scale(1.05);}

.alert-btn{
  width:42px;height:42px;border-radius:50%;
  background:rgba(122,31,43,0.3);
  border:1px solid #7a1f2b;
  color:#ff6b6b;font-size:16px;
  cursor:pointer;transition:0.3s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.alert-btn:hover{background:rgba(122,31,43,0.5);}

/* ══════════════════════════════
   MODALS
══════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(6px);
  z-index:9999;
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:#0a0f0b;
  border:1px solid rgba(31,111,67,0.3);
  border-radius:16px;padding:30px;
  width:100%;max-width:400px;
  animation:modalIn 0.3s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-box h3{color:#1f6f43;font-size:16px;margin-bottom:20px;letter-spacing:0.5px;}

.modal-input{
  width:100%;padding:12px 16px;
  background:rgba(30,30,30,0.6);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;color:white;
  font-size:14px;outline:none;
  margin-bottom:14px;transition:0.3s;
  font-family:'Inter',sans-serif;
}
.modal-input:focus{border-color:#1f6f43;}
.modal-input::placeholder{color:#444;}

.modal-btn{
  width:100%;padding:12px;
  border:none;border-radius:10px;
  font-size:14px;font-weight:600;
  cursor:pointer;transition:0.3s;
  font-family:'Inter',sans-serif;
  margin-bottom:8px;
}
.modal-btn.primary{background:#1f6f43;color:white;}
.modal-btn.primary:hover{background:#4caf50;}
.modal-btn.secondary{background:transparent;border:1px solid #333;color:#888;}
.modal-btn.secondary:hover{border-color:#7a1f2b;color:#7a1f2b;}

/* SEARCH RESULTS */
.search-results{max-height:200px;overflow-y:auto;margin-bottom:14px;}
.search-result-item{
  padding:12px;display:flex;align-items:center;gap:10px;
  border-radius:8px;cursor:pointer;transition:0.2s;
  border:1px solid transparent;
}
.search-result-item:hover{background:rgba(31,111,67,0.1);border-color:rgba(31,111,67,0.2);}
.result-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#1f6f43,#7a1f2b);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:white;
  flex-shrink:0;
}
.result-name{color:white;font-size:14px;}
.result-email{color:#555;font-size:11px;margin-top:2px;}

/* ALERT MODAL */
.alert-types{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.alert-type-btn{
  padding:7px 14px;border-radius:20px;
  border:1px solid #333;background:transparent;
  color:#9aa29a;font-size:12px;cursor:pointer;
  transition:0.3s;font-family:'Inter',sans-serif;
}
.alert-type-btn.selected{background:rgba(122,31,43,0.2);border-color:#7a1f2b;color:#ff6b6b;}

/* NOTIFICATION DOT */
.notif-dot{
  width:8px;height:8px;border-radius:50%;
  background:#ff4d4d;position:absolute;
  top:8px;right:8px;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* MOBILE */
@media(max-width:768px){
  .chat-layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .sidebar.mobile-show{display:flex;position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;}
}
</style>
</head>
<body>

<div class="chat-layout">

  <!-- ══ LEFT SIDEBAR ══ -->
  <div class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="logo">💬 Messages</div>
      <a href="explore.html" class="back-btn">← Back</a>
    </div>

    <!-- MY PROFILE -->
    <div class="my-profile">
      <div class="my-avatar" id="myAvatar">
        ?
        <div class="online-dot"></div>
      </div>
      <div class="my-info">
        <div class="name" id="myName">Loading...</div>
        <div class="status">● Online</div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input class="search-input" id="convSearch" placeholder="🔍 Search conversations..." oninput="filterConversations(this.value)">
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('chats',this)">💬 Chats</div>
      <div class="tab" onclick="switchTab('alerts',this)">🚨 Alerts</div>
    </div>

    <!-- CONVERSATIONS -->
    <div class="conversations" id="convList">
      <div class="empty-state">
        <div class="icon">💬</div>
        <p>No conversations yet.<br>Add a contact to start chatting!</p>
      </div>
    </div>

<button class="add-contact-btn" onclick="openAddContact()">
  ➕ Add Contact (Search)
</button>

<button class="add-contact-btn" onclick="addByEmailPrompt()">
  📧 Add by Email
</button>

  </div>

  <!-- ══ MAIN CHAT AREA ══ -->
  <div class="chat-main" id="chatMain">

    <!-- WELCOME SCREEN -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="w-icon">🌍</div>
      <h2>TerranovaX Messages</h2>
      <p>Select a conversation or add a contact to start messaging and sharing disaster alerts.</p>
    </div>

    <!-- CHAT VIEW (hidden initially) -->
    <div id="chatView" style="display:none;flex-direction:column;height:100%;">

      <!-- CHAT HEADER -->
      <div class="chat-header">
        <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatHeaderName">--</div>
          <div class="chat-header-status" id="chatHeaderStatus">● Online</div>
        </div>
        <div class="chat-header-actions">
          <button class="header-action-btn" title="Send Alert" onclick="openAlertModal()">🚨</button>
          <button class="header-action-btn" title="Remove Contact" onclick="removeContact()">🗑️</button>
        </div>
      </div>

      <!-- MESSAGES -->
      <div class="messages-area" id="messagesArea">
        <div class="typing-indicator" id="typingIndicator">
          <div class="msg-avatar" id="typingAvatar">?</div>
          <div class="typing-bubble">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>

      <!-- INPUT -->
      <div class="input-area">
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" placeholder="Type a message..." rows="1"
            oninput="autoResize(this);handleTyping()"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
          </textarea>
          <button class="alert-btn" onclick="openAlertModal()" title="Send Disaster Alert">🚨</button>
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- ══ ADD CONTACT MODAL ══ -->
<div class="modal-overlay" id="addContactModal">
  <div class="modal-box">
    <h3>➕ ADD CONTACT</h3>
    <input class="modal-input" id="searchUserInput" placeholder="Search by name or email..." oninput="searchUsers(this.value)">
    <div class="search-results" id="searchResults"></div>
    <button class="modal-btn secondary" onclick="closeModal('addContactModal')">Cancel</button>
  </div>
</div>

<!-- ══ ALERT MODAL ══ -->
<div class="modal-overlay" id="alertModal">
  <div class="modal-box">
    <h3>🚨 SEND DISASTER ALERT</h3>
    <div class="alert-types" id="alertTypes">
      <button class="alert-type-btn" onclick="selectAlertType(this,'🌊 Flood')">🌊 Flood</button>
      <button class="alert-type-btn" onclick="selectAlertType(this,'🌪️ Cyclone')">🌪️ Cyclone</button>
      <button class="alert-type-btn" onclick="selectAlertType(this,'🌍 Earthquake')">🌍 Earthquake</button>
      <button class="alert-type-btn" onclick="selectAlertType(this,'🔥 Wildfire')">🔥 Wildfire</button>
      <button class="alert-type-btn" onclick="selectAlertType(this,'☀️ Heatwave')">☀️ Heatwave</button>
      <button class="alert-type-btn" onclick="selectAlertType(this,'⛈️ Thunderstorm')">⛈️ Storm</button>
    </div>
    <input class="modal-input" id="alertTitle" placeholder="Alert title (e.g. Heavy flooding near main road)">
    <input class="modal-input" id="alertLocation" placeholder="📍 Your location">
    <textarea class="modal-input" id="alertDesc" placeholder="Describe what's happening..." rows="3" style="resize:none;"></textarea>
    <button class="modal-btn primary" onclick="sendAlert()">🚨 Send Alert</button>
    <button class="modal-btn secondary" onclick="closeModal('alertModal')">Cancel</button>
  </div>
</div>

<!-- FIREBASE -->

  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    projectId:         "magnificent-temples",
    storageBucket:     "magnificent-temples.firebasestorage.app",
    messagingSenderId: "836647714930",
    appId:             "1:836647714930:web:60ba09e18b183aae52c2eb"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser   = null;
  let currentChatId = null;
  let currentContact= null;
  let msgUnsubscribe= null;
  let convUnsubscribe=null;
  let typingTimeout = null;
  let typingUnsubscribe = null;
  let allContacts   = [];
  // 🔥 MAKE FUNCTIONS GLOBAL (for second script)
window.getDocs = getDocs;
window.collection = collection;
window.doc = doc;

  // ── AUTH ──
  onAuthStateChanged(auth, async (user) => {
    if(!user) { window.location.href = "login.html"; return; }
    currentUser = user;

    // Set my profile
    const name    = user.displayName || "User";
    const initial = name.charAt(0).toUpperCase();
    const myAvatar= document.getElementById("myAvatar");
    document.getElementById("myName").innerText = name;

    if(user.photoURL) {
      myAvatar.innerHTML = `<img src="${user.photoURL}" alt="me"><div class="online-dot"></div>`;
    } else {
      myAvatar.innerHTML = `${initial}<div class="online-dot"></div>`;
    }

    // Save user to Firestore users collection for search
    await setDoc(doc(db, "tnx_users", user.uid), {
      uid:         user.uid,
      name:        user.displayName || "User",
      email:       user.email,
      photoURL:    user.photoURL || null,
      lastSeen:    serverTimestamp(),
      online:      true
    }, { merge: true });

    // Load contacts + conversations
    loadConversations();
  });

  // ── LOAD CONVERSATIONS ──
  function loadConversations() {
    if(convUnsubscribe) convUnsubscribe();

    const userRef = doc(db, "tnx_users", currentUser.uid);

    convUnsubscribe = onSnapshot(userRef, async (snap) => {
      if(!snap.exists()) return;
      const data     = snap.data();
      const contacts = data.contacts || [];
      allContacts    = contacts;

      if(contacts.length === 0) {
        document.getElementById("convList").innerHTML = `
          <div class="empty-state">
            <div class="icon">💬</div>
            <p>No conversations yet.<br>Add a contact to start chatting!</p>
          </div>`;
        return;
      }

      // Load each contact's info + last message
      const convItems = [];
      for(const contactUid of contacts) {
        try {
          const contactDoc = await getDoc(doc(db, "tnx_users", contactUid));
          if(!contactDoc.exists()) continue;
          const contact = contactDoc.data();

          // Get last message
          const chatId  = getChatId(currentUser.uid, contactUid);
          const msgsRef = collection(db, "tnx_chats", chatId, "messages");
          const lastQ   = query(msgsRef, orderBy("timestamp", "desc"), limit(1));
          const lastSnap= await getDocs(lastQ);
          let lastMsg   = "";
          let lastTime  = "";
          let unread    = 0;

          if(!lastSnap.empty) {
            const lastData = lastSnap.docs[0].data();
            lastMsg  = lastData.type === "alert" ? `🚨 ${lastData.alertType}` : lastData.text;
            lastTime = lastData.timestamp?.toDate
              ? formatTime(lastData.timestamp.toDate())
              : "";
          }

          convItems.push({ contact, lastMsg, lastTime, unread, uid: contactUid });
        } catch(e) { console.error(e); }
      }

      renderConversations(convItems);
    });
  }

  function renderConversations(items) {
    const list = document.getElementById("convList");
    if(items.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>No conversations yet.</p></div>`;
      return;
    }

    list.innerHTML = items.map(({ contact, lastMsg, lastTime, uid }) => {
      const initial = (contact.name || "U").charAt(0).toUpperCase();
      const avatar  = contact.photoURL
        ? `<img src="${contact.photoURL}" alt="${contact.name}">`
        : initial;
      const isAlert = lastMsg.startsWith("🚨");
      return `
        <div class="conv-item ${currentChatId === getChatId(currentUser.uid, uid) ? 'active' : ''}"
              onclick="openChat(this,'${uid}','${contact.name}','${contact.photoURL || ''}','${contact.email}')">
          <div class="conv-avatar">${avatar}<div class="online-dot" style="display:${contact.online?'block':'none'}"></div></div>
          <div class="conv-info">
            <div class="conv-name">${contact.name}</div>
            <div class="conv-last ${isAlert?'alert-msg':''}">${lastMsg || 'Start a conversation'}</div>
          </div>
          <div class="conv-meta">
            <div class="conv-time">${lastTime}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ── OPEN CHAT ──
  window.openChat = async function(el, uid, name, photoURL, email) {
    currentContact = { uid, name, photoURL, email };
    currentChatId  = getChatId(currentUser.uid, uid);

    // Update header
    const initial = name.charAt(0).toUpperCase();
    document.getElementById("chatHeaderAvatar").innerHTML =
      photoURL ? `<img src="${photoURL}" alt="${name}">` : initial;
    document.getElementById("chatHeaderName").innerText   = name;

    // Check online status
    const contactDoc = await getDoc(doc(db, "tnx_users", uid));
    if(contactDoc.exists()) {
      const online = contactDoc.data().online;
      document.getElementById("chatHeaderStatus").innerText =
        online ? "● Online" : "● Offline";
      document.getElementById("chatHeaderStatus").style.color =
        online ? "#1f6f43" : "#555";
      document.getElementById("typingAvatar").innerHTML =
        photoURL ? `<img src="${photoURL}" alt="${name}">` : initial;
    }

    // Show chat view
    document.getElementById("welcomeScreen").style.display = "none";
    const chatView = document.getElementById("chatView");
    chatView.style.display = "flex";

    // Clear messages
    const area = document.getElementById("messagesArea");
    area.innerHTML = `
      <div class="typing-indicator" id="typingIndicator">
        <div class="msg-avatar" id="typingAvatar">${photoURL ? `<img src="${photoURL}">` : initial}</div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;

    // Mark active in sidebar
    document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"));
    el.classList.add("active");

    // Listen to messages
    if(msgUnsubscribe) msgUnsubscribe();
    const msgsRef = collection(db, "tnx_chats", currentChatId, "messages");
    const msgsQ   = query(msgsRef, orderBy("timestamp", "asc"));

    msgUnsubscribe = onSnapshot(msgsQ, (snap) => {
      const msgs = [];
      snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
      renderMessages(msgs);
    });

    // Listen to typing
      typingUnsubscribe?.();
typingUnsubscribe = onSnapshot(doc(db, "tnx_chats", currentChatId), (snap) => {
  if(!snap.exists()) return;
  const data = snap.data();
  const typing = data.typing && data.typing[currentContact.uid];
      const indicator = document.getElementById("typingIndicator");
      if(indicator) indicator.className = `typing-indicator${typing ? ' show' : ''}`;
    });
  }

  function renderMessages(msgs) {
    const area    = document.getElementById("messagesArea");
    const shouldScroll = area.scrollHeight - area.clientHeight - area.scrollTop < 100;

    // Keep typing indicator
    const typingEl = document.getElementById("typingIndicator");

    area.innerHTML = "";

    let lastDate = "";
    msgs.forEach(msg => {
      const isSent = msg.senderId === currentUser.uid;
      const time   = msg.timestamp?.toDate ? msg.timestamp.toDate() : new Date();
      const dateStr= time.toDateString();

      if(dateStr !== lastDate) {
        lastDate = dateStr;
        const divider = document.createElement("div");
        divider.className  = "date-divider";
        divider.innerText  = dateStr === new Date().toDateString() ? "Today" : dateStr;
        area.appendChild(divider);
      }

      const msgEl = document.createElement("div");
      msgEl.className = `msg ${isSent ? "sent" : "received"}`;

      const initial = isSent
        ? (currentUser.displayName || "U").charAt(0).toUpperCase()
        : (currentContact.name || "U").charAt(0).toUpperCase();

      const avatarSrc = isSent
        ? (currentUser.photoURL ? `<img src="${currentUser.photoURL}">` : initial)
        : (currentContact.photoURL ? `<img src="${currentContact.photoURL}">` : initial);

      let bubbleContent = "";
      if(msg.type === "alert") {
        bubbleContent = `
          <div class="msg-bubble alert-bubble">
            <span class="alert-tag">🚨 DISASTER ALERT</span>
            <div class="alert-title">${msg.alertType} — ${msg.alertTitle}</div>
            <div>${msg.alertDesc}</div>
            <div class="alert-loc">📍 ${msg.alertLocation}</div>
          </div>`;
      } else {
        bubbleContent = `<div class="msg-bubble">${escapeHtml(msg.text)}</div>`;
      }

      msgEl.innerHTML = `
        <div class="msg-avatar">${avatarSrc}</div>
        <div>
          ${bubbleContent}
          <div class="msg-time">
            ${formatTime(time)}
            ${isSent ? '<span class="read-tick">✓✓</span>' : ''}
          </div>
        </div>`;
      area.appendChild(msgEl);
    });

    // Re-add typing indicator
    if(typingEl) area.appendChild(typingEl);
    if(shouldScroll) area.scrollTop = area.scrollHeight;
  }

  // ── SEND MESSAGE ──
  window.sendMessage = async function() {
    const input = document.getElementById("msgInput");
    const text  = input.value.trim();
    if(!text || !currentChatId) return;

    input.value = "";
    autoResize(input);

    // Clear typing
    await updateTyping(false);

    await addDoc(collection(db, "tnx_chats", currentChatId, "messages"), {
      text,
      type:      "text",
      senderId:  currentUser.uid,
      senderName:currentUser.displayName || "User",
      timestamp: serverTimestamp(),
      read:      false
    });

    // Ensure chat doc exists
    await setDoc(doc(db, "tnx_chats", currentChatId), {
      participants: [currentUser.uid, currentContact.uid],
      lastMessage:  text,
      lastUpdated:  serverTimestamp()
    }, { merge: true });
  }

  // ── SEND ALERT ──
  window.sendAlert = async function() {
    const alertType = window.selectedAlertType || "🚨 Alert";
    const title     = document.getElementById("alertTitle").value.trim();
    const location  = document.getElementById("alertLocation").value.trim();
    const desc      = document.getElementById("alertDesc").value.trim();

    if(!title) { alert("Please enter an alert title!"); return; }
    if(!currentChatId) { alert("Please open a chat first!"); return; }

    closeModal("alertModal");

    await addDoc(collection(db, "tnx_chats", currentChatId, "messages"), {
      type:          "alert",
      alertType,
      alertTitle:    title,
      alertLocation: location || "Unknown",
      alertDesc:     desc || "",
      senderId:      currentUser.uid,
      senderName:    currentUser.displayName || "User",
      timestamp:     serverTimestamp(),
      read:          false
    });

    await setDoc(doc(db, "tnx_chats", currentChatId), {
      participants: [currentUser.uid, currentContact.uid],
      lastMessage:  `🚨 ${alertType}`,
      lastUpdated:  serverTimestamp()
    }, { merge: true });

    // Reset
    document.getElementById("alertTitle").value    = "";
    document.getElementById("alertLocation").value = "";
    document.getElementById("alertDesc").value     = "";
    document.querySelectorAll(".alert-type-btn").forEach(b => b.classList.remove("selected"));
    window.selectedAlertType = null;
  }

  // ── SEARCH USERS ──
  window.searchUsers = async function(queryText) {
    const resultsEl = document.getElementById("searchResults");
    if(!queryText || queryText.length < 2) { resultsEl.innerHTML = ""; return; }

    try {
      const usersRef = collection(db, "tnx_users");
      const snap     = await getDocs(usersRef);
      const results  = [];

      snap.forEach(d => {
        const data = d.data();
        if(d.id === currentUser.uid) return; // Skip self
        if (Array.isArray(allContacts) && allContacts.includes(d.id)) return; // Skip existing contacts
        const name  = (data.name  || "").toLowerCase();
        const email = (data.email || "").toLowerCase();
        const q     = queryText.toLowerCase();
        if(name.includes(q) || email.includes(q)) {
          results.push({ uid: d.id, ...data });
        }
      });

      if(results.length === 0) {
        resultsEl.innerHTML = `<div style="color:#444;font-size:13px;padding:12px;">No users found</div>`;
        return;
      }

      resultsEl.innerHTML = results.map(u => {
        const initial = (u.name || "U").charAt(0).toUpperCase();
        const avatar  = u.photoURL ? `<img src="${u.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : initial;
        return `
          <div class="search-result-item" onclick="addContact('${u.uid}','${u.name}','${u.email}')">
            <div class="result-avatar">${avatar}</div>
            <div>
              <div class="result-name">${u.name}</div>
              <div class="result-email">${u.email}</div>
            </div>
          </div>`;
      }).join('');
    } catch(e) { console.error(e); }
  }

  // ── ADD CONTACT ──
window.addContact = async function(uid, name, email) {
  try {
    const userRef = doc(db, "tnx_users", currentUser.uid);

    // Add to current user
await setDoc(doc(db, "tnx_users", currentUser.uid), {
  contacts: arrayUnion(uid)
}, { merge: true });

// Add back to other user (IMPORTANT)
await setDoc(doc(db, "tnx_users", uid), {
  contacts: arrayUnion(currentUser.uid)
}, { merge: true });



    closeModal("addContactModal");

    document.getElementById("searchUserInput").value = "";
    document.getElementById("searchResults").innerHTML = "";

    setTimeout(() => {
  loadConversations();
}, 500);

  } catch(e) {
    console.error("ADD CONTACT ERROR:", e);
    alert("Cannot add contact. Check console.");
  }
}

  // ── REMOVE CONTACT ──
  window.removeContact = async function() {
    if(!currentContact) return;
    if(!confirm(`Remove ${currentContact.name} from contacts?`)) return;
    try {
      const userDoc  = await getDoc(doc(db, "tnx_users", currentUser.uid));
      const contacts = userDoc.data().contacts || [];
      const updated  = contacts.filter(c => c !== currentContact.uid);
      await setDoc(doc(db, "tnx_users", currentUser.uid), { contacts: updated }, { merge: true });

      // Reset chat view
      document.getElementById("chatView").style.display   = "none";
      document.getElementById("welcomeScreen").style.display = "flex";
      currentChatId  = null;
      currentContact = null;
      if(msgUnsubscribe) msgUnsubscribe();
    } catch(e) { console.error(e); }
  }

  // ── TYPING INDICATOR ──
  window.handleTyping = async function() {
    if(!currentChatId) return;
    await updateTyping(true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => updateTyping(false), 2000);
  }

  async function updateTyping(isTyping) {
  if(!currentChatId) return;
  try {
    const chatRef = doc(db, "tnx_chats", currentChatId);
    const snap = await getDoc(chatRef);
    const existingTyping = snap.exists() ? (snap.data().typing || {}) : {};

    await setDoc(chatRef, {
      typing: {
        ...existingTyping,
        [currentUser.uid]: isTyping
      }
    }, { merge: true });

  } catch(e) {
    console.error(e);
  }
}

  // ── HELPERS ──
  function getChatId(uid1, uid2) {
    return [uid1, uid2].sort().join("_");
  }

  function formatTime(date) {
    const now  = new Date();
    const diff = now - date;
    if(diff < 60000)    return "just now";
    if(diff < 3600000)  return Math.floor(diff/60000) + "m ago";
    if(diff < 86400000) return date.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
    return date.toLocaleDateString([], { day:"2-digit", month:"short" });
  }

  function escapeHtml(text) {
    return (text || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/\n/g,"<br>");
  }

  // Filter conversations
  window.filterConversations = function(query) {
    document.querySelectorAll(".conv-item").forEach(item => {
      const name = item.querySelector(".conv-name")?.innerText?.toLowerCase() || "";
      item.style.display = name.includes(query.toLowerCase()) ? "" : "none";
    });
  }

  // Make openChat globally accessible
  window._db   = db;
  window._auth = auth;
</script>

<script>
// ── UI HELPERS ──
function openAddContact() {
  document.getElementById("addContactModal").classList.add("show");
  document.getElementById("searchUserInput").focus();
}

function closeModal(id) {
  document.getElementById(id).classList.remove("show");
}

function openAlertModal() {
  if(!currentChatId) {
  alert("Please open a chat first!");
  return;
}
  document.getElementById("alertModal").classList.add("show");
}

function selectAlertType(btn, type) {
  document.querySelectorAll(".alert-type-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  window.selectedAlertType = type;
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function switchTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  // Tab switching logic can be extended
}

// Close modals on outside click
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", (e) => {
    if(e.target === overlay) overlay.classList.remove("show");
  });
});

async function addByEmailPrompt() {
  const email = prompt("Enter email to add contact:");
  if(!email) return;

  try {
    const usersRef = collection(window._db, "tnx_users");
    const snap = await getDocs(usersRef);

    let foundUser = null;

    snap.forEach(d => {
      const data = d.data();
      if((data.email || "").trim().toLowerCase() === email.trim().toLowerCase()) {
        foundUser = { uid: d.id, ...data };
      }
    });

    if(!foundUser) {
      alert("User not found!");
      return;
    }

    await window.addContact(foundUser.uid, foundUser.name, foundUser.email);

  } catch(err) {
    console.error(err);
    alert("Error adding contact");
  }
}
// 🔴 SET OFFLINE WHEN USER LEAVES
window.addEventListener("beforeunload", async () => {
  if(currentUser){
    await setDoc(doc(db, "tnx_users", currentUser.uid), {
      online: false
    }, { merge: true });
  }
});
</script>
